[package]
name = "comprehensive"
format_version = "1.5"

[bases.CGS]
components = [
    { name = "length", symbol = "L" },
    { name = "mass", symbol = "M" },
    { name = "time", symbol = "T" },
]

[bases.CGS-EMU]
components = [
    { name = "length", symbol = "L" },
    { name = "mass", symbol = "M" },
    { name = "time", symbol = "T" },
    { name = "magnetic_pole_strength", symbol = "Φ" },
]

[bases.CGS-ESU]
components = [
    { name = "length", symbol = "L" },
    { name = "mass", symbol = "M" },
    { name = "time", symbol = "T" },
    { name = "charge", symbol = "Q" },
]

[bases.SI]
components = [
    { name = "time", symbol = "T" },
    { name = "length", symbol = "L" },
    { name = "mass", symbol = "M" },
    { name = "current", symbol = "I" },
    { name = "temperature", symbol = "Θ" },
    { name = "luminous_intensity", symbol = "J" },
    { name = "amount_of_substance", symbol = "N" },
    { name = "information", symbol = "B" },
]

[bases.atomic]
components = [
    { name = "energy", symbol = "E" },
]

[bases.natural]
components = [
    { name = "energy", symbol = "E" },
]

[bases.planck]
components = [
    { name = "energy", symbol = "E" },
]

