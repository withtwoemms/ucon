# Aerospace Unit Package
# Example domain-specific units for aviation and aerospace applications

[package]
name = "aerospace"
version = "1.1.0"
description = "Aerospace and aviation units"

# --- Units ---

[[units]]
name = "slug"
dimension = "mass"
aliases = ["slug"]

[[units]]
name = "nautical_mile"
dimension = "length"
shorthand = "nmi"
aliases = ["NM"]

[[units]]
name = "knot"
dimension = "velocity"
aliases = ["kn", "kt", "knots"]

[[units]]
name = "poundal"
dimension = "force"
aliases = ["pdl"]

# --- Edges ---

[[edges]]
src = "slug"
dst = "kilogram"
factor = 14.5939

[[edges]]
src = "nautical_mile"
dst = "meter"
factor = 1852

[[edges]]
src = "knot"
dst = "meter/second"
factor = "1852 / 3600"

[[edges]]
src = "poundal"
dst = "newton"
factor = 0.138255

# --- Constants ---

[[constants]]
symbol = "vs"
name = "speed of sound in dry air at 20C"
value = 343.0
unit = "m/s"
source = "ISA standard atmosphere"
category = "exact"
